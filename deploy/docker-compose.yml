services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "80:80"
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-restaurant_db}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
    volumes:
      - uploads_data:/app/backend/uploads
    restart: unless-stopped
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:
