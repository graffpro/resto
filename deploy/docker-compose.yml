services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost}
    ports:
      - "80:80"
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-restaurant_db}
    volumes:
      - uploads_data:/app/backend/uploads
    restart: unless-stopped
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"

volumes:
  mongo_data:
  uploads_data:
